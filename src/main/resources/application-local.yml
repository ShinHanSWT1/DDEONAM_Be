spring:
  config:
    activate:
      on-profile: local

  # 왠만하면 이대로 동일하게 할 것
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/ecodrive
    username: postgres
    password: gorani

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB
      location: D:/file_repo

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# redis 에 대해서 현재는 주석처리
