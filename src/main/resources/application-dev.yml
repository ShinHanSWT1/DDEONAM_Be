spring:
  config:
    activate:
      on-profile: dev

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 30MB
      location: /app/uploads

  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: "https://dev-gorani.lab.terminal-lab.kr/api/login/oauth2/code/kakao"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

app:
  upload:
    path: /app/uploads
