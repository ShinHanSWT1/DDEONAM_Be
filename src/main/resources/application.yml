server:
  port: 8081

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 3600000

spring:
  application:
    name: EcoDrive

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  flyway:
    enabled: true

  main:
    banner-mode: console

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.springframework.security.web: trace
    com.gorani.ecodrive: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

app:
  frontend-url: ${FRONTEND_URL}
  cdn-url: https://${AWS_BUCKET_NAME}.s3.${AWS_REGION}.amazonaws.com
  pay:
    merchant-code: ${PAY_MERCHANT_CODE:ECODRIVE}
    checkout:
      integration-type: ${PAY_CHECKOUT_INTEGRATION_TYPE:INTERNAL_TOKEN}
  driving-dummy:
    base-dir: ${DRIVING_DUMMY_BASE_DIR:generated/driving}
    generation-cron: ${DRIVING_DUMMY_GENERATION_CRON:0 0 * * * *}
    generation-enabled: ${DRIVING_DUMMY_GENERATION_ENABLED:true}
    python-command: ${DRIVING_DUMMY_PYTHON_COMMAND:python3}
    script-path: ${DRIVING_DUMMY_SCRIPT_PATH:scripts/generate_driving_dummy_json.py}
    target-users: ${DRIVING_DUMMY_TARGET_USERS:1:1}

cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ap-northeast-2
    s3:
      bucket: ${AWS_BUCKET_NAME}

juso:
  confirm-key: ${JUSO_CONFIRM_KEY}

pdf:
  font-path: ${PDF_FONT_PATH:C:/Windows/Fonts/malgunbd.ttf}
